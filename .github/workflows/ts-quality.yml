name: TS Quality Gate

on:
  push:
    paths:
      - "src/providers/renderer/remotion/**"
  pull_request:
    paths:
      - "src/providers/renderer/remotion/**"

defaults:
  run:
    working-directory: src/providers/renderer/remotion

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/providers/renderer/remotion/package-lock.json

      - run: npm ci

      - name: Prettier
        run: npx prettier --check 'src/**/*.{ts,tsx,js,jsx,json,css,md}'

      - name: ESLint
        run: npx eslint 'src/**/*.{ts,tsx}'

      - name: Type check
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run

      - name: Knip
        run: npx knip --no-exit-code

      - name: npm audit
        run: npm audit --audit-level=moderate

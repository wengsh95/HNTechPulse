llm:
  provider: "openai"
  model: "deepseek-v4-flash"
  max_tokens: 16384
  temperature: 0.4
  base_url: "https://api.deepseek.com"
  json_parse_max_retries: 3           # LLM 输出 JSON 解析失败时的重试次数（_call_llm_with_json_retry）
  max_completion_tokens_cap: 32768     # Auto-expand cap when output is truncated
  max_workers: 3                       # Concurrent story script generation
  cache_schema_version: 3              # Segment cache fingerprint version
  fast:                                # 低成本模型，用于翻译等轻量任务
    model: "deepseek-v4-flash"
    max_tokens: 4096
    temperature: 0.1


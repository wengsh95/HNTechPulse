# ── 基础/编排配置 ──

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL

pipeline:
  target_story_count: 3        # 每日固定 3 条新闻（也是深讲条数）
  max_comments_for_r1_analyze: 80   # R1a 单条分析时每条 story 最多发多少条评论

prefilter:
  enabled: true
  max_workers: 5               # 每条 story 独立评分的并发数
  min_news_focus: 4            # 新闻类门槛（1-5），低于此分数视为观点/教程/资源帖，直接过滤
  min_newsworthiness: 3        # 话题度门槛（1-5），低于此分数的故事直接过滤
  audience_interest_weight: 1.8 # B站观众兴趣/视频钩子排序权重
  discussion_heat_weight: 1.2   # HN讨论热度排序权重

hn:
  base_url: "https://hacker-news.firebaseio.com/v0"
  top_stories_count: 300
  target_stories_count: 20
  request_timeout: [5, 15]     # [connect_timeout, read_timeout] 秒
  comment_log_interval: 50        # 每抓取 N 条评论输出一次进度日志（0=关闭）
  max_comment_depth: 5            # 评论递归最大深度（深层评论价值低，截断可减少 30-50% 请求）
  max_concurrent_requests: 20     # 并发请求数（控制对 HN API 的压力，建议 10-30）
  max_retries: 3                  # 单个请求最大重试次数（指数退避：1s → 2s → 4s）
  granular_cache: true            # 评论级细粒度缓存（支持断点续传，中断重跑跳过已缓存故事）

video:
  resolution: [1920, 1080]
  fps: 24                        # 24fps 电影感足够（比 30fps 快 20%）
  theme: xhs-pastel                    # "dark" (毛玻璃暗色) | "xhs-pastel" (马卡龙柔和色)

timing:
  segment_gap: 0.0          # 非 story 段之间的停顿（由 fade-in/out 处理过渡）
  event_card_pre_gap: 0.0   # 事件卡切入时的停顿（已关闭：会导致无场景空白）
  event_card_audio_delay: 0.3  # 卡片切入后的静音停顿（秒），TTS 延后播放，卡片在停顿期间已展示
  subtitle_gap: 0.2         # story_scan 内字幕音频之间的停顿（换气感）

image_generator:
  enabled: true
  provider: "minimax"        # 真实文生图 API；也可用 "noop" 占位
  model: "image-01"          # MiniMax 文生图模型
  aspect_ratio: "16:9"       # 1280x720，匹配 Remotion CoverThumbnail 合成 (1920x1080)
  n: 1
  prompt_optimizer: false
  response_format: "base64"   # base64 直接解码落盘，省去 GET 下载
  # api_key: 留空时回退到 MINIMAX_API_KEY 环境变量

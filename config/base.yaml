# ── 基础/编排配置 ──

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL

pipeline:
  target_story_count: 3        # 正式日报条目数量（也是深讲条数）
  max_comments_for_r1_analyze: 80   # R1a 单条分析时每条 story 最多发多少条评论

hn:
  base_url: "https://hacker-news.firebaseio.com/v0"
  top_stories_count: 300
  target_stories_count: 30
  request_timeout: [5, 15]     # [connect_timeout, read_timeout] 秒
  comment_log_interval: 50        # 每抓取 N 条评论输出一次进度日志（0=关闭）
  max_comment_depth: 5            # 评论递归最大深度（深层评论价值低，截断可减少 30-50% 请求）
  max_concurrent_requests: 20     # 并发请求数（控制对 HN API 的压力，建议 10-30）
  max_retries: 3                  # 单个请求最大重试次数（指数退避：1s → 2s → 4s）
  granular_cache: true            # 评论级细粒度缓存（支持断点续传，中断重跑跳过已缓存故事）

video:
  resolution: [1920, 1080]
  fps: 24                        # 24fps 电影感足够（比 30fps 快 20%）
  theme: xhs-pastel                    # "dark" (毛玻璃暗色) | "xhs-pastel" (马卡龙柔和色)

timing:
  segment_gap: 0.0          # 非 story 段之间的停顿（由 fade-in/out 处理过渡）
  story_gap: 0.5          # story_scan 内各故事间的过渡时长（暗闪过渡 + 点击音效）
  subtitle_gap: 0.2         # story_scan 内字幕音频之间的停顿（换气感）

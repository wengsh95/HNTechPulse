tts:
  provider: "minimax"
  model: "speech-2.8-hd"
  voice_id: "Chinese (Mandarin)_Warm_Bestie"
  speed: 1
  vol: 1
  pitch: 0
  english_normalization: false
  sample_rate: 32000
  bitrate: 128000
  format: "mp3"
  channel: 1
  whisper_model: "small"
  whisper_model_path: "D:/code/HNTechPulse/whisper"

# ── TTS 语音合成配置 ──

tts:
  provider: "mimo"
  voice: "茉莉"
  model: "mimo-v2.5-tts"
  base_url: "https://api.xiaomimimo.com/v1"
  format: "wav"
  sample_rate: 24000
  temperature: 0.1
  top_p: 0.9
  seed: 42
  # ── Whisper 对齐（每段 TTS 后用 Whisper 获取字幕时间戳，不切割音频）──
  whisper_model: "small"
  whisper_model_path: "E:/Code/models/models/whisper"


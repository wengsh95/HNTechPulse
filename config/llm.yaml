# ── LLM 配置 ──

llm:
  provider: "minimax"
  model: "MiniMax-M2.7"
  base_url: "https://api.minimaxi.com/anthropic"
  max_tokens: 8192
  temperature: 0.4
  api_key_env: "MINIMAX_API_KEY"
  json_parse_max_retries: 3           # LLM 输出 JSON 解析失败时的重试次数
  max_completion_tokens_cap: 32768     # Auto-expand cap when output is truncated
  max_workers: 3                       # Concurrent story script generation
  cache_schema_version: 3              # Segment cache fingerprint version
  fast:                                # 低成本模型，用于翻译等轻量任务
    model: "MiniMax-M2.7"
    max_tokens: 4096
    temperature: 0.1


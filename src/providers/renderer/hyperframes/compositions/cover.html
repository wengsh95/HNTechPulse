<template id="cover-template">
  <div
    data-composition-id="cover-card"
    data-width="1920"
    data-height="1080"
    data-composition-variables='[
      {"id":"headline","type":"string","label":"Headline","default":"每日HN观察"},
      {"id":"date_label","type":"string","label":"Date Label","default":""},
      {"id":"subtitle","type":"string","label":"Subtitle","default":"快讯 / 洞察 / 趋势"},
      {"id":"lineup_json","type":"string","label":"Lineup JSON","default":"[]"}
    ]'
  >
    <style>
      @font-face { font-family: "Source Han Serif SC"; src: local("Source Han Serif SC"), local("Noto Serif CJK SC"), local("Songti SC"), local("STSong"); }
      @font-face { font-family: "Source Han Sans SC"; src: local("Source Han Sans SC"), local("PingFang SC"), local("Microsoft YaHei"), local("Noto Sans CJK SC"); }
      @font-face { font-family: "JetBrains Mono"; src: local("JetBrains Mono"), local("SF Mono"), local("Consolas"), local("Menlo"); }
      .hf-card {
        --color-bg: #fbf4e8;
        --color-panel: #fffdf8;
        --color-panel-warm: #f5eadb;
        --color-ink: #201914;
        --color-ink-soft: #4d4238;
        --color-ink-muted: #7d7062;
        --color-ink-faint: #a39482;
        --color-border: rgba(32, 25, 20, 0.1);
        --color-brand: #ff6600;
        --color-brand-deep: #b64a12;
        --font-display: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong", "PingFang SC", serif;
        --font-body: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", Consolas, Menlo, monospace;
        --space-2: 12px;
        --space-3: 18px;
        --space-4: 24px;
        --space-5: 30px;
        --space-6: 36px;
        --space-7: 48px;
        --radius-lg: 21px;
        --radius-xl: 27px;
        --radius-full: 999px;
        --text-6xl: 96px;
        --text-5xl: 81px;
        --text-4xl: 66px;
        --text-3xl: 51px;
        --text-2xl: 42px;
        --text-xl: 36px;
        --text-base: 30px;
        --text-sm: 24px;
        --text-xs: 21px;
        --card-padding-x: 69px;
        --card-padding-y: 63px;
        --card-safe-bottom: 168px;
        width: 100%;
        height: 100%;
        position: relative;
        box-sizing: border-box;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: var(--space-6);
        padding: var(--card-padding-y) var(--card-padding-x) var(--card-safe-bottom);
        border-radius: var(--radius-xl);
        background: linear-gradient(180deg, rgba(255,255,255,0.58), transparent 34%), var(--color-bg);
        color: var(--color-ink);
        font-family: var(--font-body);
      }
      .hf-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 1px solid rgba(32, 25, 20, 0.08);
        border-radius: inherit;
        pointer-events: none;
      }
      .hf-card::after {
        content: "";
        position: absolute;
        left: var(--card-padding-x);
        right: var(--card-padding-x);
        bottom: calc(var(--card-safe-bottom) - 51px);
        height: 1px;
        background: linear-gradient(90deg, var(--color-brand), transparent);
        opacity: 0.55;
      }
      .brand-strip {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
        min-height: 48px;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--color-ink-muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .brand-strip__brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--color-ink);
        font-size: var(--text-sm);
        font-weight: 700;
      }
      .brand-strip__brand::before {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--color-brand);
      }
      .brand-strip__date {
        display: inline-flex;
        align-items: center;
        font-variant-numeric: tabular-nums;
      }
      .brand-strip__date::before {
        content: "/";
        margin-right: 18px;
        color: var(--color-ink-faint);
      }
      .card-title {
        margin: 0;
        max-width: 1560px;
        color: var(--color-ink);
        font-family: var(--font-display);
        font-size: var(--text-5xl);
        font-weight: 900;
        line-height: 1.12;
        letter-spacing: 0;
        text-wrap: balance;
      }
      .card-deck {
        margin: 0;
        max-width: 1350px;
        color: var(--color-ink-muted);
        font-size: 31px;
        line-height: 1.3;
      }
      .opening__list {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 24px;
      }
      .news-item {
        display: grid;
        grid-template-columns: 57px minmax(0, 1fr) auto;
        align-items: center;
        gap: 24px;
        padding: 24px 30px;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        background: rgba(255, 253, 248, 0.82);
        box-shadow: 0 4px 12px rgba(32, 25, 20, 0.04);
      }
      .num-disc {
        width: 57px;
        height: 57px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: var(--color-brand);
        color: #fff;
        font-family: var(--font-display);
        font-size: 31px;
        font-weight: 900;
        box-shadow: 0 6px 18px rgba(255, 102, 0, 0.24);
      }
      .news-item__info { min-width: 0; }
      .news-item__title {
        color: var(--color-ink);
        font-size: 36px;
        font-weight: 800;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .news-item__subtitle {
        margin-top: 6px;
        color: var(--color-ink-muted);
        font-size: 24px;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .metrics {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .metric-pill {
        display: inline-flex;
        align-items: center;
        min-height: 45px;
        box-sizing: border-box;
        padding: 12px 24px;
        border-radius: var(--radius-full);
        background: var(--color-panel-warm);
        color: var(--color-ink);
        font-family: var(--font-mono);
        font-size: 24px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
    </style>
    <div class="hf-card hf-comp-cover">
      <div class="brand-strip">
        <span class="brand-strip__brand">HN TechPulse</span>
        <span class="brand-strip__date"></span>
      </div>
      <h1 class="card-title"></h1>
      <p class="card-deck"></p>
      <div class="opening__list"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const root = document.querySelector(".hf-comp-cover") || document.currentScript.parentNode;
        const host = root.closest("[data-variable-values]") || document.querySelector("#host-0");
        const raw = host ? (host.getAttribute("data-variable-values") || "{}") : "{}";
        const vars = Object.assign(
          {},
          (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {},
          (() => { try { return JSON.parse(raw); } catch(e) { return {}; } })()
        );
        let lineup = [];
        try { lineup = JSON.parse(vars.lineup_json || "[]"); } catch (e) { lineup = []; }

        root.querySelector(".brand-strip__date").textContent = vars.date_label || "";
        root.querySelector(".card-title").textContent = vars.headline || "每日HN观察";
        root.querySelector(".card-deck").textContent = vars.subtitle || "";

        const list = root.querySelector(".opening__list");
        list.innerHTML = "";
        lineup.slice(0, 3).forEach((it, index) => {
          const item = document.createElement("div");
          item.className = "news-item";
          const rank = String(it.rank || index + 1);
          const titleZh = it.editor_angle || it.title_translation || it.title_cn || it.original_title || "";
          const titleEn = it.original_title || "";
          item.innerHTML =
            '<div class="num-disc"></div>' +
            '<div class="news-item__info"><div class="news-item__title"></div><div class="news-item__subtitle"></div></div>' +
            '<div class="metrics"><span class="metric-pill"></span><span class="metric-pill"></span></div>';
          item.querySelector(".num-disc").textContent = rank;
          item.querySelector(".news-item__title").textContent = titleZh;
          item.querySelector(".news-item__subtitle").textContent = titleEn;
          const pills = item.querySelectorAll(".metric-pill");
          pills[0].textContent = "HOT " + (it.score || 0);
          pills[1].textContent = "COM " + (it.comment_count || 0);
          list.appendChild(item);
        });

        const tl = window.gsap ? gsap.timeline({ paused: true }) : { from(){ return this; } };
        tl.from(root.querySelector(".brand-strip"), { y: 22, opacity: 0, duration: 0.45, ease: "power2.out" }, 0.1);
        tl.from(root.querySelector(".card-title"), { y: 34, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.18);
        tl.from(root.querySelector(".card-deck"), { y: 22, opacity: 0, duration: 0.45, ease: "power2.out" }, 0.32);
        list.querySelectorAll(".news-item").forEach((el, i) => {
          tl.from(el, { y: 30, opacity: 0, duration: 0.48, ease: "power3.out" }, 0.48 + i * 0.12);
        });
        window.__timelines["cover-card"] = tl;
      })();
    </script>
  </div>
</template>

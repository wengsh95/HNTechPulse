<template id="closing-template">
  <div
    data-composition-id="closing-card"
    data-width="1920"
    data-height="1080"
    data-composition-variables='[
      {"id":"title","type":"string","label":"Title","default":"今日回顾"},
      {"id":"summary","type":"string","label":"Summary","default":""},
      {"id":"subtitle","type":"string","label":"Subtitle","default":""},
      {"id":"date_label","type":"string","label":"Date","default":""},
      {"id":"stories_json","type":"string","label":"Stories JSON","default":"[]"}
    ]'
  >
    <style>
      @font-face { font-family: "Source Han Serif SC"; src: local("Source Han Serif SC"), local("Noto Serif CJK SC"), local("Songti SC"), local("STSong"); }
      @font-face { font-family: "Source Han Sans SC"; src: local("Source Han Sans SC"), local("PingFang SC"), local("Microsoft YaHei"), local("Noto Sans CJK SC"); }
      @font-face { font-family: "JetBrains Mono"; src: local("JetBrains Mono"), local("SF Mono"), local("Consolas"), local("Menlo"); }
      .hf-comp-closing {
        --color-bg: #fbf4e8;
        --color-panel-warm: #f5eadb;
        --color-ink: #201914;
        --color-ink-muted: #7d7062;
        --color-ink-faint: #a39482;
        --color-border: rgba(32, 25, 20, 0.1);
        --color-brand: #ff6600;
        --font-display: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong", "PingFang SC", serif;
        --font-body: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", Consolas, Menlo, monospace;
        --card-padding-x: 69px;
        --card-padding-y: 63px;
        --card-safe-bottom: 168px;
        width: 100%;
        height: 100%;
        position: relative;
        box-sizing: border-box;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 36px;
        padding: var(--card-padding-y) var(--card-padding-x) var(--card-safe-bottom);
        border-radius: 27px;
        background: linear-gradient(180deg, rgba(255,255,255,0.58), transparent 34%), var(--color-bg);
        color: var(--color-ink);
        font-family: var(--font-body);
      }
      .hf-comp-closing::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 1px solid rgba(32, 25, 20, 0.08);
        border-radius: inherit;
        pointer-events: none;
      }
      .hf-comp-closing::after {
        content: "";
        position: absolute;
        left: var(--card-padding-x);
        right: var(--card-padding-x);
        bottom: calc(var(--card-safe-bottom) - 51px);
        height: 1px;
        background: linear-gradient(90deg, var(--color-brand), transparent);
        opacity: 0.55;
      }
      .brand-strip {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
        min-height: 48px;
        font-family: var(--font-mono);
        font-size: 21px;
        color: var(--color-ink-muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .brand-strip__brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--color-ink);
        font-size: 24px;
        font-weight: 700;
      }
      .brand-strip__brand::before {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--color-brand);
      }
      .brand-strip__date::before {
        content: "/";
        margin: 0 18px 0 0;
        color: var(--color-ink-faint);
      }
      .card-title {
        margin: 0;
        max-width: 1560px;
        color: var(--color-ink);
        font-family: var(--font-display);
        font-size: 81px;
        font-weight: 900;
        line-height: 1.12;
        letter-spacing: 0;
        text-wrap: balance;
      }
      .card-deck {
        margin: 0;
        max-width: 1350px;
        color: var(--color-ink-muted);
        font-size: 31px;
        line-height: 1.3;
      }
      .closing-summary {
        margin: 0;
        max-width: 1782px;
        color: #4d4238;
        font-size: 30px;
        line-height: 1.3;
      }
      .story-list {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 24px;
      }
      .story {
        display: grid;
        grid-template-columns: 57px minmax(0, 1fr);
        align-items: center;
        gap: 24px;
        padding: 24px 30px;
        border: 1px solid var(--color-border);
        border-radius: 21px;
        background: rgba(255, 253, 248, 0.82);
        box-shadow: 0 4px 12px rgba(32, 25, 20, 0.04);
      }
      .num-disc {
        width: 57px;
        height: 57px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: var(--color-panel-warm);
        color: #b64a12;
        font-family: var(--font-display);
        font-size: 31px;
        font-weight: 900;
      }
      .story__text { min-width: 0; }
      .story__zh {
        color: var(--color-ink);
        font-size: 36px;
        font-weight: 800;
        line-height: 1.3;
      }
      .story__en {
        margin-top: 6px;
        color: var(--color-ink-muted);
        font-size: 24px;
        line-height: 1.3;
      }
    </style>
    <div class="hf-comp-closing">
      <div class="brand-strip">
        <span class="brand-strip__brand">HN TechPulse</span>
        <span class="brand-strip__date"></span>
      </div>
      <h1 class="card-title"></h1>
      <p class="closing-summary"></p>
      <p class="card-deck"></p>
      <div class="story-list"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const root = document.querySelector(".hf-comp-closing") || document.currentScript.parentNode;
        const host = root.closest("[data-variable-values]") || document.querySelector("#host-0");
        const raw = host ? (host.getAttribute("data-variable-values") || "{}") : "{}";
        const vars = Object.assign(
          {},
          (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {},
          (() => { try { return JSON.parse(raw); } catch(e) { return {}; } })()
        );

        root.querySelector(".brand-strip__date").textContent = vars.date_label || "";
        root.querySelector(".card-title").textContent = vars.title || "今日回顾";
        const summary = root.querySelector(".closing-summary");
        if (vars.summary) summary.textContent = vars.summary;
        else summary.remove();
        const deck = root.querySelector(".card-deck");
        if (vars.subtitle) deck.textContent = vars.subtitle;
        else deck.remove();

        let stories = [];
        try { stories = JSON.parse(vars.stories_json || "[]"); } catch (e) { stories = []; }
        const list = root.querySelector(".story-list");
        list.innerHTML = "";
        stories.slice(0, 4).forEach((s, index) => {
          const item = document.createElement("div");
          item.className = "story";
          const zh = s.title || s.editor_angle || s.title_zh || "";
          const en = s.signal || s.original_title || s.title_en || "";
          item.innerHTML =
            '<div class="num-disc"></div>' +
            '<div class="story__text"><div class="story__zh"></div><div class="story__en"></div></div>';
          item.querySelector(".num-disc").textContent = String(s.rank || index + 1);
          item.querySelector(".story__zh").textContent = zh;
          item.querySelector(".story__en").textContent = en;
          list.appendChild(item);
        });

        const tl = window.gsap ? gsap.timeline({ paused: true }) : { from(){ return this; } };
        tl.from(root.querySelector(".brand-strip"), { y: 22, opacity: 0, duration: 0.42, ease: "power2.out" }, 0.08);
        tl.from(root.querySelector(".card-title"), { y: 32, opacity: 0, duration: 0.58, ease: "power3.out" }, 0.16);
        const summaryNow = root.querySelector(".closing-summary");
        if (summaryNow) tl.from(summaryNow, { y: 18, opacity: 0, duration: 0.42, ease: "power2.out" }, 0.28);
        const deckNow = root.querySelector(".card-deck");
        if (deckNow) tl.from(deckNow, { y: 18, opacity: 0, duration: 0.42, ease: "power2.out" }, 0.3);
        list.querySelectorAll(".story").forEach((el, i) => {
          tl.from(el, { y: 28, opacity: 0, duration: 0.45, ease: "power3.out" }, 0.46 + i * 0.12);
        });
        window.__timelines["closing-card"] = tl;
      })();
    </script>
  </div>
</template>

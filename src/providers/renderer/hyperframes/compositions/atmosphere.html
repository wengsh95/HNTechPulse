<template id="atmosphere-template">
  <div
    data-composition-id="atmosphere-card"
    data-width="1920"
    data-height="1080"
    data-composition-variables='[
      {"id":"title","type":"string","label":"Title","default":"争议指数 0.0 存在分歧"},
      {"id":"subtitle","type":"string","label":"Subtitle","default":""},
      {"id":"date_label","type":"string","label":"Date","default":""},
      {"id":"stance_json","type":"string","label":"Stance JSON","default":"{}"},
      {"id":"debate_focus_json","type":"string","label":"Debate Focus JSON","default":"[]"},
      {"id":"quotes_json","type":"string","label":"Quotes JSON","default":"[]"}
    ]'
  >
    <style>
      @font-face { font-family: "Source Han Serif SC"; src: local("Source Han Serif SC"), local("Noto Serif CJK SC"), local("Songti SC"), local("STSong"); }
      @font-face { font-family: "Source Han Sans SC"; src: local("Source Han Sans SC"), local("PingFang SC"), local("Microsoft YaHei"), local("Noto Sans CJK SC"); }
      @font-face { font-family: "JetBrains Mono"; src: local("JetBrains Mono"), local("SF Mono"), local("Consolas"), local("Menlo"); }
      .hf-comp-atmo {
        --color-bg: #fbf4e8;
        --color-ink: #201914;
        --color-ink-soft: #4d4238;
        --color-ink-muted: #7d7062;
        --color-ink-faint: #a39482;
        --color-border: rgba(32, 25, 20, 0.1);
        --color-brand: #ff6600;
        --color-brand-deep: #b64a12;
        --color-green: #4f8761;
        --color-gray: #8a8075;
        --color-amber: #c69230;
        --font-display: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong", "PingFang SC", serif;
        --font-body: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", Consolas, Menlo, monospace;
        --card-padding-x: 69px;
        --card-padding-y: 63px;
        --card-safe-bottom: 168px;
        width: 100%;
        height: 100%;
        position: relative;
        box-sizing: border-box;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: var(--card-padding-y) var(--card-padding-x) var(--card-safe-bottom);
        border-radius: 27px;
        background: linear-gradient(180deg, rgba(255,255,255,0.58), transparent 34%), var(--color-bg);
        color: var(--color-ink);
        font-family: var(--font-body);
      }
      .hf-comp-atmo::before {
        content: "";
        position: absolute;
        inset: 0;
        border: 1px solid rgba(32, 25, 20, 0.08);
        border-radius: inherit;
        pointer-events: none;
      }
      .hf-comp-atmo::after {
        content: "";
        position: absolute;
        left: var(--card-padding-x);
        right: var(--card-padding-x);
        bottom: calc(var(--card-safe-bottom) - 51px);
        height: 1px;
        background: linear-gradient(90deg, var(--color-brand), transparent);
        opacity: 0.55;
      }
      .brand-strip {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
        min-height: 48px;
        font-family: var(--font-mono);
        font-size: 21px;
        color: var(--color-ink-muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .brand-strip__brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--color-ink);
        font-size: 24px;
        font-weight: 700;
      }
      .brand-strip__brand::before {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--color-brand);
      }
      .brand-strip__date::before {
        content: "/";
        margin: 0 18px 0 0;
        color: var(--color-ink-faint);
      }
      .card-title {
        margin: 0;
        max-width: 1470px;
        color: var(--color-ink);
        font-family: var(--font-display);
        font-size: 81px;
        font-weight: 900;
        line-height: 1.12;
        letter-spacing: 0;
        text-wrap: balance;
      }
      .card-deck {
        margin: 0;
        max-width: 1350px;
        color: var(--color-ink-muted);
        font-size: 31px;
        line-height: 1.3;
      }
      .atmo-card__layout {
        min-height: 0;
        flex: 1;
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.05fr) minmax(0, 1.05fr);
        align-content: center;
        gap: 30px;
      }
      .panel {
        min-width: 0;
        min-height: 450px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: 24px 30px;
        border: 1px solid var(--color-border);
        border-radius: 21px;
        background: rgba(255, 253, 248, 0.82);
        box-shadow: 0 4px 12px rgba(32, 25, 20, 0.04);
      }
      .section-title {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--color-brand-deep);
        font-size: 36px;
        font-weight: 800;
        line-height: 1.3;
      }
      .section-title::before {
        content: "";
        width: 6px;
        height: 27px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--color-brand);
      }
      .stance {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .stance__row {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .stance__label {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        color: var(--color-ink-soft);
        font-size: 24px;
        font-weight: 700;
      }
      .stance__label-val {
        color: var(--color-ink);
        font-family: var(--font-mono);
        font-size: 30px;
        font-variant-numeric: tabular-nums;
      }
      .stance__bar {
        height: 17px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(32, 25, 20, 0.09);
      }
      .stance__fill {
        height: 100%;
        width: 0;
        border-radius: inherit;
      }
      .stance__fill--support { background: var(--color-green); }
      .stance__fill--neutral { background: var(--color-gray); }
      .stance__fill--skeptical { background: var(--color-amber); }
      .focus-list {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .focus-item {
        padding-left: 18px;
        border-left: 5px solid rgba(255, 102, 0, 0.24);
        color: var(--color-ink);
        font-size: 30px;
        line-height: 1.3;
      }
      .focus-item--quote {
        border-left-color: var(--color-brand);
        color: var(--color-ink-soft);
        font-style: italic;
      }
    </style>
    <div class="hf-comp-atmo">
      <div class="brand-strip">
        <span class="brand-strip__brand">HN TechPulse</span>
        <span class="brand-strip__date"></span>
      </div>
      <h1 class="card-title"></h1>
      <p class="card-deck"></p>
      <div class="atmo-card__layout">
        <section class="panel">
          <div class="section-title">立场分布</div>
          <div class="stance"></div>
        </section>
        <section class="panel">
          <div class="section-title">讨论焦点</div>
          <div class="focus-list debate-list"></div>
        </section>
        <section class="panel">
          <div class="section-title">评论金句</div>
          <div class="focus-list quote-list"></div>
        </section>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const root = document.querySelector(".hf-comp-atmo") || document.currentScript.parentNode;
        const host = root.closest("[data-variable-values]") || document.querySelector("#host-0");
        const raw = host ? (host.getAttribute("data-variable-values") || "{}") : "{}";
        const vars = Object.assign(
          {},
          (window.__hyperframes && window.__hyperframes.getVariables) ? window.__hyperframes.getVariables() : {},
          (() => { try { return JSON.parse(raw); } catch(e) { return {}; } })()
        );

        root.querySelector(".brand-strip__date").textContent = vars.date_label || "";
        root.querySelector(".card-title").textContent = vars.title || "";
        const deck = root.querySelector(".card-deck");
        if (vars.subtitle) deck.textContent = vars.subtitle;
        else deck.remove();

        const labels = {
          support: "支持",
          neutral: "中立",
          skeptical: "质疑",
          "支持": "支持",
          "中立": "中立",
          "质疑": "质疑"
        };
        const cls = {
          support: "stance__fill--support",
          "支持": "stance__fill--support",
          neutral: "stance__fill--neutral",
          "中立": "stance__fill--neutral",
          skeptical: "stance__fill--skeptical",
          "质疑": "stance__fill--skeptical"
        };
        let stance = {};
        try { stance = JSON.parse(vars.stance_json || "{}"); } catch (e) { stance = {}; }
        const stanceEl = root.querySelector(".stance");
        const order = ["支持", "中立", "质疑"];
        order.forEach((key) => {
          const rawVal = stance[key] ?? stance[Object.keys(labels).find((k) => labels[k] === key)] ?? 0;
          const pct = Math.max(0, Math.min(100, Number(rawVal) <= 1 ? Number(rawVal) * 100 : Number(rawVal)));
          const row = document.createElement("div");
          row.className = "stance__row";
          row.innerHTML =
            '<div class="stance__label"><span></span><span class="stance__label-val"></span></div>' +
            '<div class="stance__bar"><div class="stance__fill"></div></div>';
          row.querySelector(".stance__label span").textContent = key;
          row.querySelector(".stance__label-val").textContent = Math.round(pct) + "%";
          const fill = row.querySelector(".stance__fill");
          fill.className = "stance__fill " + (cls[key] || "stance__fill--neutral");
          fill.style.width = pct + "%";
          stanceEl.appendChild(row);
        });

        let focus = [];
        try { focus = JSON.parse(vars.debate_focus_json || "[]"); } catch (e) { focus = []; }
        const debateList = root.querySelector(".debate-list");
        focus.slice(0, 4).forEach((txt) => {
          const item = document.createElement("div");
          item.className = "focus-item";
          item.textContent = txt;
          debateList.appendChild(item);
        });

        let quotes = [];
        try { quotes = JSON.parse(vars.quotes_json || "[]"); } catch (e) { quotes = []; }
        const quoteList = root.querySelector(".quote-list");
        quotes.slice(0, 2).forEach((q) => {
          const item = document.createElement("div");
          item.className = "focus-item focus-item--quote";
          const text = (q && typeof q === "object") ? (q.display_text || q.text_cn || q.text || "") : String(q || "");
          item.textContent = text;
          quoteList.appendChild(item);
        });

        const tl = window.gsap ? gsap.timeline({ paused: true }) : { from(){ return this; } };
        tl.from(root.querySelector(".brand-strip"), { y: 22, opacity: 0, duration: 0.42, ease: "power2.out" }, 0.08);
        tl.from(root.querySelector(".card-title"), { y: 32, opacity: 0, duration: 0.58, ease: "power3.out" }, 0.16);
        const deckNow = root.querySelector(".card-deck");
        if (deckNow) tl.from(deckNow, { y: 18, opacity: 0, duration: 0.42, ease: "power2.out" }, 0.3);
        tl.from(root.querySelectorAll(".panel"), { y: 26, opacity: 0, duration: 0.48, ease: "power3.out", stagger: 0.12 }, 0.42);
        tl.from(root.querySelectorAll(".stance__row"), { opacity: 0, duration: 0.35, ease: "power2.out", stagger: 0.08 }, 0.68);
        tl.from(root.querySelectorAll(".focus-item"), { x: 18, opacity: 0, duration: 0.35, ease: "power2.out", stagger: 0.08 }, 0.78);
        window.__timelines["atmosphere-card"] = tl;
      })();
    </script>
  </div>
</template>
